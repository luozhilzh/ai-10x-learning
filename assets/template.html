<!DOCTYPE html>
<html lang='zh-CN'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>{{TITLE}} · 学习卡</title>
<style>
:root{
  --bg:#f8fafc; --surface:#ffffff; --ink:#1e293b; --muted:#64748b;
  --line:#e2e8f0; --blue:#2563eb; --blue-soft:#eff6ff;
  --teal:#0d9488; --teal-soft:#f0fdfa; --amber:#d97706; --amber-soft:#fffbeb;
  --radius:12px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;}
.wrap{max-width:820px;margin:0 auto;padding:32px 20px 64px;}
header{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:20px;}
h1{font-size:22px;margin:0 0 4px;}
.sub{color:var(--muted);font-size:14px;margin:0 0 16px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--blue-soft);color:var(--blue);}
.chip.teal{background:var(--teal-soft);color:var(--teal);}
.chip.amber{background:var(--amber-soft);color:var(--amber);}
section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:20px;}
h2{font-size:17px;margin:0 0 16px;display:flex;align-items:center;gap:8px;}
h2 .dot{width:10px;height:10px;border-radius:50%;background:var(--blue);}
.ladder{display:flex;flex-direction:column;gap:10px;}
.lvl{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid var(--line);border-radius:10px;background:var(--blue-soft);}
.lvl .num{width:28px;height:28px;flex:0 0 28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;}
.lvl .body{font-size:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.flash{background:var(--teal-soft);border:1px solid #ccfbf1;border-radius:10px;padding:14px;}
.flash .q{font-weight:600;font-size:14px;color:var(--teal);margin-bottom:6px;}
.flash .a{font-size:13px;color:var(--ink);}
.qa{border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.qa .q{font-weight:600;font-size:14px;margin-bottom:6px;}
.qa .q .tag{font-size:11px;color:var(--muted);margin-left:6px;}
.qa .a{font-size:13px;color:var(--muted);}
footer{color:var(--muted);font-size:12px;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class='wrap'>
  <header>
    <h1>{{TITLE}}</h1>
    <p class='sub'>AI 10x 学习法 · 学习成果卡（核心版）</p>
    <div class='chips'>
      <span class='chip'>角色：{{ROLE}}</span>
      <span class='chip teal'>时间预算：{{BUDGET}}</span>
      <span class='chip amber'>目标：{{GOAL}}</span>
    </div>
  </header>
  <section>
    <h2><span class='dot'></span>学习阶梯</h2>
    <div class='ladder'>{{LADDER}}</div>
  </section>
  <section>
    <h2><span class='dot'></span>一页速查表（闪卡）</h2>
    <div class='grid'>{{FLASHCARDS}}</div>
  </section>
  <section>
    <h2><span class='dot'></span>题库（考到崩溃）</h2>
    <div class='bank'>{{QUESTION_BANK}}</div>
  </section>
  <footer>由 ai-10x-learning skill 生成 · 互动在对话中发生，此卡为学习成果收尾</footer>
</div>
</body>
</html>
